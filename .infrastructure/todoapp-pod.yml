apiVersion: v1
kind: Pod
metadata:
   name: todoapp-pod
   namespace: todoapp
spec:
  containers:
    - name: todoapp
    image: dianahorban/todoapp:3.0.0
    ports:
    - containerPort: 8000
    livenessProbe:
      httpGet:
        path: /api/health/live
        port: 8000
      initialDelaySeconds: 10
      periodSeconds: 5
    readinessProbe:
      httpGet:
        path: /api/healthz/ready
        port: 8000
      initialDelaySeconds: 5
      periodSeconds: 5
